stages:
  - validate
  - run
  - resume

validate-shiro:
  stage: validate
  image: ghcr.io/rajitk13/shiro-automation:latest
  script:
    - shiro validate -workflow tests/fixtures/pause-workflow.json -ci tests/fixtures/valid-gitlab-ci.yml

run-shiro:
  stage: run
  image: ghcr.io/rajitk13/shiro-automation:latest
  script:
    - shiro run -workflow tests/fixtures/pause-workflow.json -state-store gitlab -fresh
  artifacts:
    paths:
      - .shiro/

resume-shiro:
  stage: resume
  image: ghcr.io/rajitk13/shiro-automation:latest
  needs:
    - run-shiro
  when: manual
  script:
    - shiro run -workflow tests/fixtures/pause-workflow.json -state-store gitlab
  artifacts:
    paths:
      - .shiro/
