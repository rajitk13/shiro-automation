name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
  release:
    types: [ created ]

permissions:
  contents: write

jobs:
  lint:
    runs-on: ubuntu-latest
    if: github.event_name != 'release'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

      - name: Check commit messages
        uses: wagoid/commitlint-github-action@v5
        with:
          configFile: .commitlintrc.json

  test:
    runs-on: ubuntu-latest
    if: github.event_name != 'release'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'

      - name: Run tests
        run: go test -v -cover ./... -coverprofile=coverage.out

      - name: Filter coverage
        run: |
          go tool cover -func=coverage.out | grep -v "cmd/runtime/help.go" > coverage-filtered.out || true

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage-filtered.out

  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
          - os: macos-latest
            goos: darwin
            goarch: amd64
          - os: macos-latest
            goos: darwin
            goarch: arm64
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'

      - name: Get version
        id: version
        run: |
          if [ "${{ github.ref_type }}" == "tag" ]; then
            VERSION="${{ github.ref_name }}"
          else
            VERSION="dev-${{ github.sha }}"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Building version: ${VERSION}"

      - name: Build shiro
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build -ldflags="-X main.version=${{ steps.version.outputs.version }}" -o shiro-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/runtime

      - name: Generate checksum
        run: |
          sha256sum shiro-${{ matrix.goos }}-${{ matrix.goarch }} > shiro-${{ matrix.goos }}-${{ matrix.goarch }}.sha256

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: shiro-${{ matrix.goos }}-${{ matrix.goarch }}
          path: shiro-${{ matrix.goos }}-${{ matrix.goarch }}*
          if-no-files-found: error

  release:
    runs-on: ubuntu-latest
    needs: [ build ]
    if: github.event_name == 'release' && github.event.action == 'created'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: shiro-*
          merge-multiple: true

      - name: List downloaded files
        run: |
          echo "Downloaded files:"
          ls -la dist/
          echo "Recursive listing:"
          find dist/ -type f

      - name: Flatten artifacts
        run: |
          for dir in dist/*/; do
            for file in "$dir"*; do
              if [ -f "$file" ]; then
                mv "$file" dist/
              fi
            done
            rmdir "$dir" 2>/dev/null || true
          done

      - name: List flattened files
        run: |
          echo "Flattened files:"
          ls -la dist/

      - name: Create release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  auto-release:
    runs-on: ubuntu-latest
    needs: [ build, lint, test ]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get CalVer tag
        id: calver
        run: |
          DATE=$(date +%Y.%m.%d)
          # Fetch remote tags to check for existing today's tags
          git fetch --tags
          if git tag -l "v${DATE}.*" | tail -n 1; then
            LAST_TAG=$(git tag -l "v${DATE}.*" | sort -V | tail -n 1)
            BUILD_NUM=$(echo $LAST_TAG | cut -d. -f4)
            BUILD_NUM=$((BUILD_NUM + 1))
          else
            BUILD_NUM=0
          fi
          TAG="v${DATE}.${BUILD_NUM}"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "CalVer tag: ${TAG}"

      - name: Create and push tag
        run: |
          TAG="${{ steps.calver.outputs.tag }}"
          git tag -f "$TAG"
          git push origin "$TAG" --force

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: shiro-*
          merge-multiple: true

      - name: Flatten artifacts
        run: |
          for dir in dist/*/; do
            for file in "$dir"*; do
              if [ -f "$file" ]; then
                mv "$file" dist/
              fi
            done
            rmdir "$dir" 2>/dev/null || true
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: "${{ steps.calver.outputs.tag }}"
          name: "Release ${{ steps.calver.outputs.tag }}"
          body: "Automated CalVer release"
          files: dist/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Delete old tags and releases (keep latest 3)
        run: |
          gh release list --limit 100 | tail -n +4 | awk '{print $3}' | xargs -I {} gh release delete {} --yes || true
          gh tag list | tail -n +4 | xargs -I {} gh tag delete {} --force || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

