name: Build and Push Docker Image

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
      - 'v*.*.*'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get CalVer tag
        id: calver
        run: |
          DATE=$(date +%Y.%m.%d)
          # Fetch remote tags to check for existing today's tags
          git fetch --tags
          if git tag -l "v${DATE}.*" | tail -n 1; then
            LAST_TAG=$(git tag -l "v${DATE}.*" | sort -V | tail -n 1)
            BUILD_NUM=$(echo $LAST_TAG | cut -d. -f4)
            BUILD_NUM=$((BUILD_NUM + 1))
          else
            BUILD_NUM=0
          fi
          TAG="v${DATE}.${BUILD_NUM}"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "CalVer tag: ${TAG}"

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.calver.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
