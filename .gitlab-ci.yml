stages:
  - review
  - test
  - build
  - release

# AI-powered MR review
ai-mr-review:
  stage: review
  image: golang:1.21
  before_script:
    - apt-get update && apt-get install -y git
    - go build -o shiro ./cmd/runtime
  script:
    - ./shiro run examples/mr-review.json -config configs/models.yaml -state-store gitlab
  artifacts:
    paths:
      - .shiro/
    expire_in: 1 day
  only:
    - merge_requests

# Push notification
push-notification:
  stage: review
  image: golang:1.21
  before_script:
    - go build -o shiro ./cmd/runtime
  script:
    - ./shiro run examples/push-notification.json -config configs/models.yaml
  only:
    - main
    - master

# Unit tests
unit-tests:
  stage: test
  image: golang:1.21
  script:
    - go test -v -cover ./...
  coverage: '/coverage: \d+.\d+% of statements/'

# Build binaries for multiple platforms
build:
  stage: build
  image: golang:1.21
  script:
    - mkdir -p dist
    - GOOS=linux GOARCH=amd64 go build -o dist/shiro-linux-amd64 ./cmd/runtime
    - GOOS=linux GOARCH=arm64 go build -o dist/shiro-linux-arm64 ./cmd/runtime
    - GOOS=darwin GOARCH=amd64 go build -o dist/shiro-darwin-amd64 ./cmd/runtime
    - GOOS=darwin GOARCH=arm64 go build -o dist/shiro-darwin-arm64 ./cmd/runtime
    - GOOS=windows GOARCH=amd64 go build -o dist/shiro-windows-amd64.exe ./cmd/runtime
    - GOOS=linux GOARCH=amd64 go build -o dist/webhook-server-linux-amd64 ./cmd/webhook-server
    - GOOS=darwin GOARCH=amd64 go build -o dist/webhook-server-darwin-amd64 ./cmd/webhook-server
    - GOOS=windows GOARCH=amd64 go build -o dist/webhook-server-windows-amd64.exe ./cmd/webhook-server
    - cd dist && for f in *; do sha256sum "$f" > "$f.sha256"; done
  artifacts:
    paths:
      - dist/
    expire_in: 30 days
  only:
    - main
    - master
    - tags

# Create GitLab release
release:
  stage: release
  image: alpine:latest
  script:
    - apk add --no-cache curl
    - |
      if [ -n "$CI_COMMIT_TAG" ]; then
        echo "Creating release for tag $CI_COMMIT_TAG"
        # GitLab release creation would go here
        # This requires proper GitLab API setup
      else
        echo "Skipping release - not a tag"
      fi
  artifacts:
    paths:
      - dist/
    expire_in: 90 days
  only:
    - tags
